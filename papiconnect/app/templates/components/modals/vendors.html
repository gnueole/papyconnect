<!-- 
  PapyConnect — Supported Brands & Reference Modal
  =============================================================================
  Purpose: Provides a complete reference guide for all supported IoT and media
           hardware brands, displaying their specific API paths, protocol types, 
           port numbers, and raw payload structures.
  
  Architectural Glue:
    - Controlled by `vendorsModal.open` and populated by `vendorsModal.list`.
    - Retrieves details dynamically by listing all vendor specs configured on the backend.
-->
  <!-- Supported Vendors Reference Modal (Alpine.js) -->
  <div
    x-show="vendorsModal.open"
    class="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-black/85 backdrop-blur-md"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 scale-95"
    x-transition:enter-end="opacity-100 scale-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100 scale-100"
    x-transition:leave-end="opacity-0 scale-95"
    @click.self="vendorsModal.open = false"
    style="display: none;"
  >
    <div class="bg-[#131722]/95 border border-gold/30 rounded-2xl max-w-4xl w-full p-8 relative shadow-2xl flex flex-col md:flex-row gap-6 max-h-[85vh] overflow-hidden backdrop-blur-lg text-left">
      <button
        @click="vendorsModal.open = false"
        class="absolute top-4 right-4 text-gray-500 hover:text-white transition-colors focus:outline-none text-2xl font-semibold leading-none"
        title="Close"
      >
        &times;
      </button>

      <!-- Sidebar listing vendors -->
      <div class="w-full md:w-1/3 border-b md:border-b-0 md:border-r border-rim/40 pb-4 md:pb-0 md:pr-6 shrink-0 flex flex-col">
        <h3 class="text-xs font-extrabold text-gold uppercase tracking-wider mb-4">Supported Brands</h3>
        <div class="space-y-4 overflow-y-auto flex-1 pr-1">
          <template x-for="cat in [
            { id: 'tv', name: 'TVs' },
            { id: 'amplifier', name: 'Amplifiers' },
            { id: 'game', name: 'Game Consoles' },
            { id: 'speaker', name: 'Speakers' },
            { id: 'lighting', name: 'Lighting' }
          ]" :key="cat.id">
            <div x-show="vendorsModal.list.some(v => v.type === cat.id)" class="space-y-2">
              <!-- Category Header -->
              <div class="flex items-center gap-2 text-[10px] font-extrabold text-gold uppercase tracking-wider select-none border-b border-rim/20 pb-1.5">
                <div :class="iconBg(cat.id)" class="w-6 h-6 rounded flex items-center justify-center shrink-0 scale-90" x-html="icon(cat.id)"></div>
                <span x-text="cat.name"></span>
              </div>
              
              <!-- Category Vendors -->
              <div class="space-y-1.5 pl-3 border-l border-rim/20">
                <template x-for="v in vendorsModal.list.filter(v => v.type === cat.id)" :key="v.name">
                  <button
                    @click="vendorsModal.selected = v"
                    class="w-full text-left px-3 py-2.5 rounded-xl border transition-all flex items-center justify-between active:scale-[0.98]"
                    :class="vendorsModal.selected && vendorsModal.selected.name === v.name
                      ? 'bg-gold/15 border-gold text-white font-bold shadow-lg shadow-gold/5'
                      : 'bg-panel/40 border-rim/50 text-gray-400 hover:bg-panel/60 hover:text-gray-200'"
                  >
                    <span class="text-xs" x-text="v.name"></span>
                    <span class="text-[8px] font-semibold bg-gold/10 text-gold px-1.5 py-0.5 rounded border border-gold/20" x-text="v.version"></span>
                  </button>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- Content area details -->
      <div class="w-full md:w-2/3 flex-1 flex flex-col overflow-y-auto min-h-0">
        <div class="grid grid-cols-1 grid-rows-1">
          <!-- Selected Vendor Details (Visible) -->
          <template x-if="vendorsModal.selected">
            <div class="col-start-1 row-start-1 space-y-5">
              <!-- Header specs -->
              <div class="flex items-start justify-between gap-4">
                <div>
                  <h2 class="text-xl font-extrabold text-white" x-text="vendorsModal.selected.name"></h2>
                  <p class="text-xs text-gold/80 mt-1 font-semibold" x-text="'Protocol Version: ' + vendorsModal.selected.version"></p>
                </div>
              </div>

              <!-- Description -->
              <p class="text-xs text-gray-400 leading-relaxed" x-text="vendorsModal.selected.description"></p>

              <!-- API specs list -->
              <div class="space-y-4 pt-4 border-t border-rim/40">
                <h4 class="text-xs font-extrabold text-gold uppercase tracking-wider">API Specs & Call Reference</h4>
                
                <div class="space-y-4">
                  <template x-for="(call, callName) in vendorsModal.selected.api_calls" :key="callName">
                    <div class="bg-panel/40 border border-rim/50 rounded-xl p-4 space-y-3">
                      <p class="text-xs font-bold text-gray-200" x-text="callName"></p>
                      <div class="flex gap-2 text-[10px]">
                        <span class="bg-blue-500/10 text-blue-400 px-1.5 py-0.5 rounded border border-blue-500/20 font-bold" x-text="call.protocol"></span>
                        <template x-if="call.method">
                          <span class="bg-emerald-500/10 text-emerald-400 px-1.5 py-0.5 rounded border border-emerald-500/20 font-bold" x-text="call.method"></span>
                        </template>
                        <template x-if="call.port">
                          <span class="bg-purple-500/10 text-purple-400 px-1.5 py-0.5 rounded border border-purple-500/20 font-bold" x-text="'Port ' + call.port"></span>
                        </template>
                        <template x-if="call.path">
                          <span class="bg-gray-500/15 text-gray-300 px-1.5 py-0.5 rounded border border-gray-500/20 font-mono" x-text="call.path"></span>
                        </template>
                      </div>

                      <pre class="bg-black/50 text-gray-400 p-3 rounded-lg font-mono text-[9px] overflow-x-auto border border-rim/30 leading-normal" x-text="JSON.stringify(call, null, 2)"></pre>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </template>

          <!-- Longest Vendor Details (Invisible, for sizing) -->
          <template x-if="vendorsModal.longest">
            <div class="col-start-1 row-start-1 space-y-5 invisible pointer-events-none select-none" aria-hidden="true">
              <!-- Header specs -->
              <div class="flex items-start justify-between gap-4">
                <div>
                  <h2 class="text-xl font-extrabold text-white" x-text="vendorsModal.longest.name"></h2>
                  <p class="text-xs text-gold/80 mt-1 font-semibold" x-text="'Protocol Version: ' + vendorsModal.longest.version"></p>
                </div>
              </div>

              <!-- Description -->
              <p class="text-xs text-gray-400 leading-relaxed" x-text="vendorsModal.longest.description"></p>

              <!-- API specs list -->
              <div class="space-y-4 pt-4 border-t border-rim/40">
                <h4 class="text-xs font-extrabold text-gold uppercase tracking-wider">API Specs & Call Reference</h4>
                
                <div class="space-y-4">
                  <template x-for="(call, callName) in vendorsModal.longest.api_calls" :key="callName">
                    <div class="bg-panel/40 border border-rim/50 rounded-xl p-4 space-y-3">
                      <p class="text-xs font-bold text-gray-200" x-text="callName"></p>
                      <div class="flex gap-2 text-[10px]">
                        <span class="bg-blue-500/10 text-blue-400 px-1.5 py-0.5 rounded border border-blue-500/20 font-bold" x-text="call.protocol"></span>
                        <template x-if="call.method">
                          <span class="bg-emerald-500/10 text-emerald-400 px-1.5 py-0.5 rounded border border-emerald-500/20 font-bold" x-text="call.method"></span>
                        </template>
                        <template x-if="call.port">
                          <span class="bg-purple-500/10 text-purple-400 px-1.5 py-0.5 rounded border border-purple-500/20 font-bold" x-text="'Port ' + call.port"></span>
                        </template>
                        <template x-if="call.path">
                          <span class="bg-gray-500/15 text-gray-300 px-1.5 py-0.5 rounded border border-gray-500/20 font-mono" x-text="call.path"></span>
                        </template>
                      </div>

                      <pre class="bg-black/50 text-gray-400 p-3 rounded-lg font-mono text-[9px] overflow-x-auto border border-rim/30 leading-normal" x-text="JSON.stringify(call, null, 2)"></pre>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </template>
        </div>

        <template x-if="!vendorsModal.selected">
          <div class="flex items-center justify-center h-48 text-gray-500 text-xs">
            Select a brand on the left to see its protocol specs.
          </div>
        </template>
      </div>
    </div>
  </div>
