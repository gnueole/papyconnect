<!-- 
  PapyConnect — Factory Reset Confirmation Modal
  =============================================================================
  Purpose: Confirms critical database deletion requests.
  
  Architectural Glue:
    - Controlled by `factoryResetModal.open` in Alpine.js scope.
    - Calls `executeFactoryReset()` in `scripts.html` to trigger `DELETE /api/factory-reset`.
-->
  <!-- Factory Reset Confirmation Modal (Alpine.js) -->
  <div
    x-show="factoryResetModal.open"
    class="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-black/85 backdrop-blur-md"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 scale-95"
    x-transition:enter-end="opacity-100 scale-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100 scale-100"
    x-transition:leave-end="opacity-0 scale-95"
    @click.self="factoryResetModal.open = false"
    style="display: none;"
  >
    <div class="bg-[#1f1315]/95 border border-red-500/30 rounded-2xl max-w-md w-full p-8 relative shadow-2xl text-center backdrop-blur-lg">
      <button
        @click="factoryResetModal.open = false"
        class="absolute top-4 right-4 text-gray-500 hover:text-white transition-colors focus:outline-none text-2xl font-semibold leading-none"
        title="Close"
      >
        &times;
      </button>

      <div class="mb-4 flex justify-center">
        <div class="w-16 h-16 rounded-2xl bg-red-500/10 border border-red-500/30 flex items-center justify-center text-red-500 shadow-lg shadow-red-500/10">
          <svg class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
        </div>
      </div>

      <h3 class="text-xl font-extrabold text-red-400 tracking-tight mb-2">Factory Reset</h3>
      <p class="text-xs text-gray-400 mb-6">Are you absolutely sure?</p>
      
      <div class="p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-left text-xs text-red-300 space-y-2 mb-6">
        <p class="font-bold">This operation is irreversible and will:</p>
        <ul class="list-disc pl-5 space-y-1">
          <li>Delete all registered IoT devices on the server.</li>
          <li>Delete all configured virtual actions/shortcuts.</li>
          <li>Clear all local storage and settings in this browser.</li>
        </ul>
      </div>

      <div class="flex gap-4">
        <button
          @click="factoryResetModal.open = false"
          class="flex-1 px-4 py-2.5 rounded-xl border border-rim/60 text-xs font-semibold text-gray-300 hover:bg-rim/20 active:scale-98 transition-all"
        >
          Cancel
        </button>
        <button
          @click="executeFactoryReset()"
          class="flex-1 px-4 py-2.5 rounded-xl bg-red-600 hover:bg-red-500 text-xs font-semibold text-white active:scale-98 transition-all shadow-lg shadow-red-600/20"
        >
          Yes, Reset Everything
        </button>
      </div>
    </div>
  </div>
