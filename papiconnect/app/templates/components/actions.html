<!-- CONFIGURED ACTIONS (Right Panel) -->
<section class="lg:col-span-7 bg-panel border border-rim rounded-2xl p-6">
        <div class="flex items-center justify-between pb-4 border-b border-rim mb-5">
          <h3 class="font-extrabold text-sm uppercase tracking-wider text-gray-400">Configured Actions</h3>
          <span class="text-xs text-gray-500 font-semibold" x-text="actions.length + ' actions'"></span>
        </div>

        <div 
          :class="actions.length > 6 ? 'max-h-[500px] overflow-y-auto pr-1' : 'max-h-none overflow-visible'"
          class="grid gap-4 sm:grid-cols-2"
        >
          <template x-for="a in actions" :key="a.id">
            <button 
              @click="triggerAction(a, $event)"
              :class="a.state === 'active' ? activeCardClass(a.icon) : 'border-rim hover:border-gold/30 bg-rim/15 hover:scale-[1.01]'"
              class="relative group p-3 rounded-xl border text-left transition-all duration-200 cursor-pointer select-none active:scale-95 overflow-hidden flex items-center justify-between w-full outline-none focus-visible:ring-2 focus-visible:ring-gold/40"
            >
              <!-- Ripple effect container -->
              <div class="ripple-container"></div>

              <div class="flex items-center gap-2.5 pointer-events-none">
                <div :class="iconBg(a.icon)" class="w-9 h-9 rounded-lg flex items-center justify-center" x-html="icon(a.icon)"></div>
                <div>
                  <h4 class="text-xs font-bold text-gray-200" x-text="a.title"></h4>
                  <p class="text-[9px] font-mono text-gray-500 mt-0.5" x-text="a.id"></p>
                </div>
              </div>

              <!-- Delete action button (span wrapper to avoid nested button tags) -->
              <span @click.stop="removeAction(a.id)" class="text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity p-2 -mr-2 cursor-pointer z-10" title="Remove action">
                <svg class="w-4 h-4 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </span>
            </button>
          </template>

          <template x-if="actions.length === 0">
            <div class="sm:col-span-2 flex flex-col items-center justify-center py-16 text-gray-600 text-center">
              <svg class="w-12 h-12 mb-3 opacity-15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <p class="text-xs font-semibold text-gray-500">No actions configured</p>
              <p class="text-[10px] mt-0.5">Use the wizard on the left to configure your shortcuts.</p>
            </div>
          </template>
        </div>
      </section>

    </div>
