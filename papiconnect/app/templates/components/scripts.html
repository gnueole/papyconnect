<!-- 
  PapyConnect — Scripts Hub Template
  =============================================================================
  Purpose: Sets up global modal helpers, imports centralized services metadata,
           and links external Alpine.js logic and animations scripts.
  
  Architectural Glue:
    - Included in `index.html` via `{% include 'components/scripts.html' %}`.
    - Resolves and populates window-scope variables (like `SERVICES_METADATA`).
    - Links static scripts `fireworks.js` and `app.js` which manage the UI execution loop.
-->
<script>
    // Global functions for the Vanilla JS tutorial modal
    function openTuto(tutoHtml) {
      document.getElementById('tuto-content').innerHTML = tutoHtml;
      document.getElementById('tuto-modal').style.display = 'flex';
    }

    // Close on Escape key press
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeTuto();
      }
    });

    function closeTuto() {
      document.getElementById('tuto-modal').style.display = 'none';
      document.getElementById('tuto-content').innerHTML = '';
    }

    {% include 'components/services_metadata.html' %}
</script>

<!-- Fullscreen Fireworks Particle System (External Static Asset) -->
<script src="/static/js/fireworks.js"></script>

<!-- Alpine.js Application Controller (External Static Asset) -->
<script src="/static/js/app.js"></script>
