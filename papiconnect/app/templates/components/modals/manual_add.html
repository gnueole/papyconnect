<!-- 
  PapyConnect — Manual Add Ghost Device Modal
  =============================================================================
  Purpose: Exposes a form allowing the manual registration of custom devices 
           (e.g., devices hidden from mDNS broadcasting or located on subnets).
  
  Architectural Glue:
    - Renders when `manualAddModal.open` is true.
    - Binds form inputs to `manualAddModal.form` object.
    - Submits data via `submitManualAdd()` calling `POST /api/devices/manual` in `scripts.html`.
-->
  <!-- Manual Add Ghost Device Modal (Alpine.js) -->
  <div
    x-show="manualAddModal.open"
    class="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-black/85 backdrop-blur-md"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 scale-95"
    x-transition:enter-end="opacity-100 scale-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100 scale-100"
    x-transition:leave-end="opacity-0 scale-95"
    @click.self="manualAddModal.open = false"
    x-cloak
  >
    <div class="bg-[#1e2530] border border-[#2a3545] rounded-2xl max-w-md w-full p-6 relative shadow-2xl backdrop-blur-lg animate-fadeUp">
      <button
        @click="manualAddModal.open = false"
        class="absolute top-4 right-4 text-gray-500 hover:text-white transition-colors focus:outline-none text-2xl font-semibold leading-none"
        title="Close"
      >
        &times;
      </button>

      <h3 class="text-base font-extrabold text-gold tracking-tight mb-2 flex items-center gap-2">
        <svg class="w-5 h-5 text-gold shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        Add Ghost Device
      </h3>
      <p class="text-xs text-gray-400 mb-6">Manually register a custom device hidden from local mDNS scans.</p>

      <form @submit.prevent="submitManualAdd()" class="space-y-4 text-left">
        <div>
          <label class="block text-[10px] uppercase font-bold tracking-wider text-gray-400 mb-1.5" for="add-name">Device Name</label>
          <input
            id="add-name"
            type="text"
            required
            x-model="manualAddModal.form.name"
            placeholder="e.g. Living Room TV"
            class="w-full bg-[#131722] border border-[#2a3545] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-gold/50 placeholder-gray-600 transition-colors"
          />
        </div>

        <div>
          <label class="block text-[10px] uppercase font-bold tracking-wider text-gray-400 mb-1.5" for="add-ip">IP Address</label>
          <input
            id="add-ip"
            type="text"
            required
            x-model="manualAddModal.form.ip"
            placeholder="e.g. 192.168.1.53"
            class="w-full bg-[#131722] border border-[#2a3545] rounded-xl px-4 py-2.5 text-xs text-white font-mono focus:outline-none focus:border-gold/50 placeholder-gray-600 transition-colors"
          />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-[10px] uppercase font-bold tracking-wider text-gray-400 mb-1.5" for="add-type">Category Type</label>
            <select
              id="add-type"
              x-model="manualAddModal.form.type"
              class="w-full bg-[#131722] border border-[#2a3545] rounded-xl px-3 py-2.5 text-xs text-white focus:outline-none focus:border-gold/50 transition-colors"
            >
              <option value="tv">TV</option>
              <option value="amplifier">Amplifier</option>
              <option value="game">Game Console</option>
              <option value="speaker">Smart Speaker</option>
              <option value="lighting">Smart Lighting</option>
              <option value="unknown">Unknown / Other</option>
            </select>
          </div>

          <div>
            <label class="block text-[10px] uppercase font-bold tracking-wider text-gray-400 mb-1.5" for="add-vendor">Hardware Brand</label>
            <select
              id="add-vendor"
              x-model="manualAddModal.form.vendor"
              class="w-full bg-[#131722] border border-[#2a3545] rounded-xl px-3 py-2.5 text-xs text-white focus:outline-none focus:border-gold/50 transition-colors"
            >
              <option value="Sony">Sony</option>
              <option value="Denon">Denon</option>
              <option value="Marantz">Marantz</option>
              <option value="LG TV">LG TV</option>
              <option value="Sharp TV">Sharp TV</option>
              <option value="Samsung TV">Samsung TV</option>
              <option value="Roku">Roku</option>
              <option value="Bbox">Bbox</option>
              <option value="Xbox">Xbox</option>
              <option value="Playstation">Playstation</option>
              <option value="Sonos">Sonos</option>
              <option value="Yamaha MusicCast">Yamaha MusicCast</option>
              <option value="Philips Hue">Philips Hue</option>
              <option value="Philips WiZ">Philips WiZ</option>
              <option value="Generic">Generic / Other</option>
            </select>
          </div>
        </div>

        <div class="flex gap-4 pt-4">
          <button
            type="button"
            @click="manualAddModal.open = false"
            class="flex-1 px-4 py-2.5 rounded-xl border border-rim/60 text-xs font-semibold text-gray-300 hover:bg-rim/20 active:scale-98 transition-all"
          >
            Cancel
          </button>
          <button
            type="submit"
            class="flex-1 px-4 py-2.5 rounded-xl bg-gold hover:bg-ember text-xs font-semibold text-black active:scale-98 transition-all shadow-lg shadow-gold/10"
          >
            Add Device
          </button>
        </div>
      </form>
    </div>
  </div>
