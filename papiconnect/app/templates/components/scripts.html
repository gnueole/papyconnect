<script>
    // Global functions for the Vanilla JS tutorial modal
    function openTuto(tutoHtml) {
      document.getElementById('tuto-content').innerHTML = tutoHtml;
      document.getElementById('tuto-modal').style.display = 'flex';
    }

    // Close on Escape key press
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeTuto();
      }
    });

    function closeTuto() {
      document.getElementById('tuto-modal').style.display = 'none';
      document.getElementById('tuto-content').innerHTML = '';
    }

    function app() {
      return {
        devices:  [],
        actions:  [],
        loading:  true,
        scanning: false,
        toast:    '',
        selectedDeviceForDetails: null,
        deviceDetailsModal: {
          open: false
        },
        aboutModal: {
          open: false
        },
        vendorsModal: {
          open: false,
          list: [],
          selected: null,
          longest: null
        },
        manualAddModal: {
          open: false,
          form: {
            name: '',
            ip: '',
            type: 'tv',
            vendor: 'Sony'
          }
        },
        factoryResetModal: {
          open: false
        },
        _toastTimer: null,

        wizard: {
          step: 1,
          service: '',
          device: null,
          title: ''
        },

        get onlineCount() {
          return this.devices.filter(d => d.status === 'online').length;
        },

        async init() { await this.load(); },

        async load() {
          this.loading = true;
          try {
            const r = await fetch('/api/devices');
            if (!r.ok) throw new Error();
            this.devices = await r.json();
            await this.loadActions();
          } catch {
            this.notify('Failed to load registry data.');
          } finally {
            this.loading = false;
          }
        },

        async loadActions() {
          try {
            const r = await fetch('/api/actions');
            if (!r.ok) throw new Error();
            this.actions = await r.json();
          } catch {
            this.notify('Failed to load configured actions.');
          }
        },

        openDeviceDetails(d) {
          this.selectedDeviceForDetails = d;
          this.deviceDetailsModal.open = true;
        },

        formatActionName(name) {
          const map = {
            'launch_spotify': 'Spotify Connect',
            'launch_netflix': 'Netflix',
            'launch_youtube': 'YouTube',
            'power_on': 'Power On',
            'power_off': 'Power Off'
          };
          if (map[name]) return map[name];
          const clean = name.replace('launch_', '').replace('_', ' ');
          return clean.charAt(0).toUpperCase() + clean.slice(1);
        },

        async executeDeviceAction(ip, actionName) {
          try {
            this.notify(`Executing ${this.formatActionName(actionName)} on ${ip}...`);
            const r = await fetch(`/api/devices/${ip}/action/${actionName}`, {
              method: 'POST'
            });
            if (!r.ok) throw new Error();
            this.notify(`Action ${this.formatActionName(actionName)} executed successfully!`);
          } catch {
            this.notify(`Failed to execute action.`);
          }
        },

        async scan() {
          if (this.scanning) return;
          this.scanning = true;
          this.notify('Network scan started (mDNS + ping, ~7s)…');
          try {
            await fetch('/api/scan', { method: 'POST' });
            await new Promise(r => setTimeout(r, 8000));
            await this.load();
            this.notify(`Scan completed — ${this.devices.length} device(s) found in registry.`);
          } catch {
            this.notify('Failed to scan network.');
          } finally {
            this.scanning = false;
          }
        },

        async remove(ip) {
          try {
            const r = await fetch(`/api/devices/${ip}`, { method: 'DELETE' });
            if (!r.ok) throw new Error();
            this.devices = this.devices.filter(d => d.ip !== ip);
            this.notify(`Device ${ip} removed.`);
          } catch {
            this.notify('Failed to remove device.');
          }
        },

        notify(msg) {
          this.toast = msg;
          clearTimeout(this._toastTimer);
          this._toastTimer = setTimeout(() => this.toast = '', 6000);
        },

        async openVendors() {
          this.vendorsModal.open = true;
          try {
            const r = await fetch('/api/vendors');
            if (!r.ok) throw new Error();
            this.vendorsModal.list = await r.json();
            if (this.vendorsModal.list.length > 0) {
              if (!this.vendorsModal.selected) {
                this.vendorsModal.selected = this.vendorsModal.list[0];
              }
              // Find the vendor with the longest description and api calls representation
              let longest = this.vendorsModal.list[0];
              let maxLen = 0;
              for (const v of this.vendorsModal.list) {
                const len = (v.description || '').length + JSON.stringify(v.api_calls || {}).length;
                if (len > maxLen) {
                  maxLen = len;
                  longest = v;
                }
              }
              this.vendorsModal.longest = longest;
            }
          } catch {
            this.notify('Failed to load supported vendors API specs.');
          }
        },

        async openManualAdd() {
          this.manualAddModal.form.name = '';
          this.manualAddModal.form.type = 'tv';
          this.manualAddModal.form.vendor = 'Sony';
          this.manualAddModal.open = true;
          try {
            const r = await fetch('/api/network-prefix');
            if (r.ok) {
              const data = await r.json();
              this.manualAddModal.form.ip = data.prefix;
            } else {
              this.manualAddModal.form.ip = '192.168.1.';
            }
          } catch {
            this.manualAddModal.form.ip = '192.168.1.';
          }
        },

        async submitManualAdd() {
          try {
            const res = await fetch('/api/devices', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                name: this.manualAddModal.form.name,
                ip: this.manualAddModal.form.ip,
                type: this.manualAddModal.form.type,
                vendor: this.manualAddModal.form.vendor,
                variables: {}
              })
            });
            if (!res.ok) {
              const err = await res.json();
              throw new Error(err.detail || 'Failed to add device.');
            }
            this.manualAddModal.open = false;
            this.notify('Device manually added successfully.');
            await this.load();
          } catch (e) {
            this.notify(e.message || 'Failed to add device.');
          }
        },

        openAbout() {
          this.aboutModal.open = true;
          setTimeout(() => {
            startFireworks();
          }, 50);
        },

        closeAbout() {
          this.aboutModal.open = false;
          stopFireworks();
        },

        confirmFactoryReset() {
          this.factoryResetModal.open = true;
        },

        async executeFactoryReset() {
          this.factoryResetModal.open = false;
          this.loading = true;
          try {
            const r = await fetch('/api/factory-reset', { method: 'POST' });
            if (!r.ok) throw new Error();
            localStorage.clear();
            sessionStorage.clear();
            this.notify('Factory reset successful. Reloading...');
            setTimeout(() => {
              window.location.reload();
            }, 1500);
          } catch {
            this.notify('Failed to perform factory reset.');
            this.loading = false;
          }
        },

        ago(iso) {
          if (!iso) return '';
          try {
            const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
            if (diff < 60)  return 'just now';
            if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
            return new Date(iso).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
          } catch { return ''; }
        },

        // Wizard Logic
        selectService(service) {
          this.wizard.service = service;
          this.wizard.step = 2;
        },

        selectDevice(device) {
          this.wizard.device = device;
          let room = 'Living Room';
          if (device.name.toLowerCase().includes('salon')) room = 'Living Room';
          else if (device.name.toLowerCase().includes('louistib')) room = 'Louistib';
          else if (device.name.toLowerCase().includes('chambre')) room = 'Bedroom';
          let baseTitle = `${this.serviceLabel(this.wizard.service)} (${room})`;
          this.wizard.title = this.getUniqueTitle(baseTitle);
          this.wizard.step = 3;
        },

        getUniqueTitle(baseTitle) {
          let finalTitle = baseTitle;
          let counter = 2;
          while (this.actions.some(act => act.title.toLowerCase() === finalTitle.toLowerCase())) {
            finalTitle = `${baseTitle} ${counter}`;
            counter++;
          }
          return finalTitle;
        },

        serviceLabel(service) {
          return {
            netflix: 'Netflix',
            spotify: 'Spotify',
            youtube: 'YouTube',
            power_on: 'Power On',
            power_off: 'Power Off'
          }[service] || service;
        },

        filteredWizardDevices() {
          if (this.wizard.service === 'netflix') {
            return this.devices.filter(d => d.type === 'sony_bravia_tv' || d.type === 'tv' || d.type === 'bbox' || d.type === 'xbox' || d.type === 'playstation');
          } else if (this.wizard.service === 'youtube') {
            return this.devices.filter(d => d.type === 'sony_bravia_tv' || d.type === 'tv' || d.type === 'google_home' || d.type === 'bbox' || d.type === 'xbox' || d.type === 'playstation');
          } else if (this.wizard.service === 'spotify') {
            return this.devices.filter(d => d.type === 'amplifier' || d.type === 'denon_amplifier' || d.type === 'sony_bravia_tv' || d.type === 'tv' || d.type === 'google_home' || d.type === 'playstation');
          } else if (this.wizard.service === 'power_on') {
            return this.devices.filter(d => d.catalog && d.catalog.actions && d.catalog.actions.power_on);
          } else if (this.wizard.service === 'power_off') {
            return this.devices.filter(d => d.catalog && d.catalog.actions && d.catalog.actions.power_off);
          }
          return [];
        },

        resetWizard() {
          this.wizard = {
            step: 1,
            service: '',
            device: null,
            title: ''
          };
        },

        async submitWizard() {
          if (!this.wizard.device || !this.wizard.title) return;
          const targetApp = this.wizard.service === 'spotify'
            ? 'launch_spotify'
            : (this.wizard.service.startsWith('power_')
               ? this.wizard.service
               : 'launch_' + this.wizard.service);

          const service = this.wizard.service;
          const deviceName = this.wizard.device.name;
          const slug = deviceName.toLowerCase()
            .replace(/[^a-z0-9]/g, '_')
            .replace(/_+/g, '_')
            .replace(/^_+|_+$/g, '');
          const actionId = `${service}_${slug}`;

          const payload = {
            id: actionId,
            device_ip: this.wizard.device.ip,
            target_app: targetApp,
            title: this.wizard.title,
            icon: this.wizard.service
          };

          try {
            this.notify("Adding action to dashboard...");
            const r = await fetch('/api/actions', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            if (!r.ok) throw new Error();
            await this.loadActions();
            this.resetWizard();
            this.notify("Action added successfully!");
          } catch {
            this.notify("Failed to add action.");
          }
        },

        async removeAction(id) {
          try {
            const r = await fetch(`/api/actions/${id}`, { method: 'DELETE' });
            if (!r.ok) throw new Error();
            this.actions = this.actions.filter(a => a.id !== id);
            this.notify("Action removed.");
          } catch {
            this.notify("Failed to remove action.");
          }
        },

            philips_wiz:       'bg-cyan-950/30    text-cyan-400    border border-cyan-500/20',
            netflix:           'bg-red-950/30    text-red-400 border border-red-500/20',
            spotify:           'bg-emerald-950/30 text-emerald-400 border border-emerald-500/20',
            youtube:           'bg-red-950/30    text-red-400 border border-red-500/20',
            power_on:          'bg-emerald-950/30 text-emerald-400 border border-emerald-500/20',
            power_off:         'bg-red-950/30     text-red-400     border border-red-500/20',
            game:              'bg-indigo-950/30  text-indigo-400  border border-indigo-500/20',

    // ─────────────────────────────────────────────────────────────────────────
    // Canvas Fireworks Particle System (Coded by Éole & Antigravity)
    // ─────────────────────────────────────────────────────────────────────────
    let fireworksAnimId = null;
    let fireworksCanvas = null;
    let fireworksCtx = null;
    let fireworksParticles = [];
    let fireworksExplosions = [];

    function startFireworks() {
      fireworksCanvas = document.getElementById('fireworksCanvas');
      if (!fireworksCanvas) return;
      fireworksCanvas.style.display = 'block';
      fireworksCtx = fireworksCanvas.getContext('2d');
      
      resizeFireworksCanvas();
      window.addEventListener('resize', resizeFireworksCanvas);

      fireworksParticles = [];
      fireworksExplosions = [];
      
      // Spawn initial set
      for (let i = 0; i < 5; i++) {
        setTimeout(spawnFirework, i * 150);
      }

      animateFireworks();
    }

    function stopFireworks() {
      if (fireworksAnimId) {
        cancelAnimationFrame(fireworksAnimId);
        fireworksAnimId = null;
      }
      if (fireworksCanvas) {
        fireworksCanvas.style.display = 'none';
      }
      window.removeEventListener('resize', resizeFireworksCanvas);
    }

    function resizeFireworksCanvas() {
      if (fireworksCanvas) {
        fireworksCanvas.width = window.innerWidth;
        fireworksCanvas.height = window.innerHeight;
      }
    }

    class FireworkParticle {
      constructor(x, y, targetX, targetY, color) {
        this.x = x;
        this.y = y;
        this.targetX = targetX;
        this.targetY = targetY;
        this.color = color;
        this.speed = 3 + Math.random() * 4;
        this.angle = Math.atan2(targetY - y, targetX - x);
        this.distToTarget = Math.hypot(targetX - x, targetY - y);
        this.distTraveled = 0;
        this.coordinates = [];
        this.coordinateCount = 3;
        while (this.coordinateCount--) {
          this.coordinates.push([this.x, this.y]);
        }
      }

      update() {
        this.coordinates.pop();
        this.coordinates.unshift([this.x, this.y]);
        
        let vx = Math.cos(this.angle) * this.speed;
        let vy = Math.sin(this.angle) * this.speed;
        
        this.x += vx;
        this.y += vy;
        
        return Math.hypot(this.targetX - this.x, this.targetY - this.y) <= this.speed;
      }

      draw() {
        fireworksCtx.beginPath();
        fireworksCtx.moveTo(this.coordinates[this.coordinates.length - 1][0], this.coordinates[this.coordinates.length - 1][1]);
        fireworksCtx.lineTo(this.x, this.y);
        fireworksCtx.strokeStyle = this.color;
        fireworksCtx.lineWidth = 2.5;
        fireworksCtx.stroke();
      }
    }

    class ExplosionParticle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.angle = Math.random() * Math.PI * 2;
        this.speed = 2 + Math.random() * 8;
        this.friction = 0.94;
        this.gravity = 0.12;
        this.alpha = 1.0;
        this.decay = 0.008 + Math.random() * 0.012;
        this.coordinates = [];
        this.coordinateCount = 5;
        while (this.coordinateCount--) {
          this.coordinates.push([this.x, this.y]);
        }
      }

      update() {
        this.coordinates.pop();
        this.coordinates.unshift([this.x, this.y]);
        this.speed *= this.friction;
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed + this.gravity;
        this.alpha -= this.decay;
        return this.alpha <= this.decay;
      }

      draw() {
        fireworksCtx.beginPath();
        fireworksCtx.moveTo(this.coordinates[this.coordinates.length - 1][0], this.coordinates[this.coordinates.length - 1][1]);
        fireworksCtx.lineTo(this.x, this.y);
        fireworksCtx.strokeStyle = `rgba(${this.color}, ${this.alpha})`;
        fireworksCtx.lineWidth = 2.0;
        fireworksCtx.stroke();
      }
    }

    function hexToRgb(hex) {
      let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '255, 255, 255';
    }

    function spawnFirework() {
      let x = Math.random() * window.innerWidth;
      let y = window.innerHeight;
      let targetX = Math.random() * window.innerWidth;
      let targetY = 100 + Math.random() * (window.innerHeight * 0.4);
      let colors = ['#e9a623', '#ff0055', '#00ffcc', '#ffcc00', '#ff00ff', '#33ccff', '#99ff33'];
      let color = colors[Math.floor(Math.random() * colors.length)];
      
      fireworksParticles.push(new FireworkParticle(x, y, targetX, targetY, color));
    }

    function createExplosion(x, y, colorHex) {
      let rgb = hexToRgb(colorHex);
      let count = 100 + Math.floor(Math.random() * 60); // Big big explosions!
      for (let i = 0; i < count; i++) {
        fireworksExplosions.push(new ExplosionParticle(x, y, rgb));
      }
    }

    function animateFireworks() {
      fireworksCtx.globalCompositeOperation = 'destination-out';
      fireworksCtx.fillStyle = 'rgba(0, 0, 0, 0.18)';
      fireworksCtx.fillRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
      fireworksCtx.globalCompositeOperation = 'lighter';

      for (let i = fireworksParticles.length - 1; i >= 0; i--) {
        let p = fireworksParticles[i];
        p.draw();
        if (p.update()) {
          createExplosion(p.targetX, p.targetY, p.color);
          fireworksParticles.splice(i, 1);
        }
      }

      for (let i = fireworksExplosions.length - 1; i >= 0; i--) {
        let ep = fireworksExplosions[i];
        ep.draw();
        if (ep.update()) {
          fireworksExplosions.splice(i, 1);
        }
      }

      if (Math.random() < 0.07) {
        spawnFirework();
      }

      fireworksAnimId = requestAnimationFrame(animateFireworks);
    }
  </script>
