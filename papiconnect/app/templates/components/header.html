<header class="sticky top-0 z-50 bg-pit/90 backdrop-blur-md header-bar">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between gap-4">

      <!-- Logo -->
      <a href="/" class="flex items-center gap-3 shrink-0 hover:opacity-90 transition-opacity cursor-pointer">
        <div class="w-9 h-9 rounded-xl bg-gold/10 border border-gold/30 flex items-center justify-center">
          <!-- Network icon -->
          <svg class="w-5 h-5 text-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="5"  r="2"/><circle cx="5"  cy="19" r="2"/><circle cx="19" cy="19" r="2"/>
            <path stroke-linecap="round" d="M12 7v4M12 11l-5 6M12 11l5 6"/>
          </svg>
        </div>
        <div class="leading-tight">
          <h1 class="font-extrabold text-lg tracking-tight">
            Papy<span class="text-gold">Connect</span>
          </h1>
          <p class="text-[10px] text-gray-500 font-medium uppercase tracking-widest">Home Multimedia Hub</p>
        </div>
      </a>

      <!-- Live stats -->
      <div class="hidden sm:flex items-center gap-6 text-sm">
        <span class="flex items-center gap-2 text-gray-400">
          <span class="w-2 h-2 rounded-full bg-emerald-400 animate-sonar inline-block"></span>
          <span class="text-white font-semibold" x-text="onlineCount"></span> online
        </span>
        <span class="text-gray-600">·</span>
        <span class="text-gray-400"><span class="text-white font-semibold" x-text="devices.length"></span> total</span>
      </div>

      <!-- Action buttons -->
      <div class="flex items-center gap-3">
        <!-- Manual Add button -->
        <button
          id="btn-manual-add"
          @click="openManualAdd()"
          class="flex items-center gap-2 px-5 py-2.5 rounded-xl font-semibold text-sm
                 bg-rim/25 text-gray-400 border border-rim/40 hover:bg-rim/40 hover:text-gray-200 active:scale-95
                 transition-all duration-150 shrink-0"
        >
          <svg class="w-4 h-4 inline -mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
          </svg>
          <span>Manual Add</span>
        </button>

        <!-- Scan button -->
        <button
          id="btn-scan"
          @click="scan()"
          :disabled="scanning"
          class="flex items-center gap-2 px-5 py-2.5 rounded-xl font-semibold text-sm text-black
                 bg-gold hover:bg-ember active:scale-95 shadow-scan-btn
                 disabled:opacity-50 disabled:cursor-not-allowed
                 transition-all duration-150 shrink-0"
        >
          <span x-show="scanning"  class="spin" aria-hidden="true"></span>
          <span x-show="!scanning">
            <svg class="w-4 h-4 inline -mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
            </svg>
          </span>
          <span x-text="scanning ? 'Scanning network…' : 'Scan Network'"></span>
        </button>
      </div>
    </div>
  </header>
