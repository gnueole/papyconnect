version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# PapyConnect + n8n — Stack "Clé en main"
#
# network_mode: host sur les deux services :
#   • PapyConnect capte les broadcasts UDP du LAN (mDNS _googlecast / SSDP)
#   • n8n requête PapyConnect nativement via http://localhost:8000
#   • Aucun port mapping nécessaire (les services écoutent directement sur l'hôte)
#
# Ports utilisés sur l'hôte :
#   • 8000 → PapyConnect API + Dashboard
#   • 5678 → n8n UI + Webhook
#
# Structure attendue sur l'hôte (NAS ou Raspberry Pi) :
#   /volume1/docker/papiconnect/      (ou ~/papiconnect/ sur le Pi)
#   ├── docker-compose.yml
#   ├── app/
#   │   ├── main.py
#   │   └── templates/
#   │       └── index.html
#   ├── data/                         ← auto-créé (registry.json)
#   └── n8n_data/                     ← auto-créé (workflows, credentials n8n)
# ══════════════════════════════════════════════════════════════════════════════

services:
  # ── Le Radar : PapyConnect ──────────────────────────────────────────────
  papiconnect:
    image: python:3.12-slim
    container_name: papiconnect
    network_mode: host
    volumes:
      - ./app:/app
      - ./data:/app/data
    working_dir: /app
    command: >
      bash -c "apt-get update -qq && 
      apt-get install -y --no-install-recommends iputils-ping && 
      pip install --quiet --no-cache-dir fastapi==0.111.0 'uvicorn[standard]==0.29.0' jinja2==3.1.4 zeroconf==0.132.2 aiohttp==3.9.5 && 
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped

  # ── Le Cerveau : n8n ────────────────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    network_mode: host
    volumes:
      - ./n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=gronas
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://gronas:5678/
      - GENERIC_TIMEZONE=Europe/Paris
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_SECURE_COOKIE=false
    restart: unless-stopped
