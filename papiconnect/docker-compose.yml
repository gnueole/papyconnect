version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# PapyConnect + n8n — Turnkey Stack
#
# network_mode: host on both services:
#   • PapyConnect captures LAN UDP broadcasts (mDNS _googlecast / SSDP)
#   • n8n requests PapyConnect natively via http://localhost:8000
#   • No port mapping required (services listen directly on host)
#
# Ports used on host:
#   • 8000 → PapyConnect API + Dashboard
#   • 5678 → n8n UI + Webhook
#
# Expected host directory structure (NAS or Raspberry Pi):
#   /volume1/docker/papiconnect/      (or ~/papiconnect/ on Pi)
#   ├── docker-compose.yml
#   ├── app/
#   │   ├── main.py
#   │   └── templates/
#   │       └── index.html
#   ├── data/                         ← auto-created (registry.json)
#   └── n8n_data/                     ← auto-created (workflows, credentials n8n)
# ══════════════════════════════════════════════════════════════════════════════

services:
  # ── Le Radar : PapyConnect ──────────────────────────────────────────────
  papiconnect:
    image: papiconnect:latest
    container_name: papiconnect
    network_mode: host
    volumes:
      - ./data:/app/data
    environment:
      - PAPYCONNECT_SUBNET=${PAPYCONNECT_SUBNET}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # ── Le Cerveau : n8n ────────────────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    network_mode: host
    volumes:
      - ./n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=${GRONAS_IP:-gronas}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://${GRONAS_IP:-gronas}:${N8N_PORT:-5678}/
      - GENERIC_TIMEZONE=Europe/Paris
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_SECURE_COOKIE=false
    restart: unless-stopped
