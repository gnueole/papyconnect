<!-- 
  PapyConnect — About Modal Sub-include
  =============================================================================
  Purpose: Displays project metadata, credits, home lab info, versioning, 
           and the official repository hyperlink.
  
  Architectural Glue:
    - Controlled by `aboutModal.open` state in the Alpine.js application scope.
-->
  <!-- About Modal (Alpine.js) -->
  <div
    x-show="aboutModal.open"
    class="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-black/85 backdrop-blur-md"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 scale-95"
    x-transition:enter-end="opacity-100 scale-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100 scale-100"
    x-transition:leave-end="opacity-0 scale-95"
    @click.self="closeAbout()"
    x-cloak
  >
    <div class="bg-[#131722]/90 border border-gold/30 rounded-2xl max-w-md w-full p-8 relative shadow-2xl text-center backdrop-blur-lg">
      <button
        @click="closeAbout()"
        class="absolute top-4 right-4 text-gray-500 hover:text-white transition-colors focus:outline-none text-2xl font-semibold leading-none"
        title="Close"
      >
        &times;
      </button>

      <div class="mb-4 flex justify-center">
        <div class="w-16 h-16 rounded-2xl bg-gold/10 border border-gold/30 flex items-center justify-center text-gold shadow-lg shadow-gold/10">
          <svg class="w-10 h-10 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
      </div>

      <h3 class="text-xl font-extrabold text-gold tracking-tight mb-2">PapyConnect</h3>
      <p class="text-xs text-gray-400 mb-6">IoT Service Registry & Gateway</p>
      
      <div class="py-4 border-y border-rim/40 mb-6 bg-rim/10 rounded-xl px-4">
        <p class="text-sm text-gray-200 font-medium tracking-wide">Coded by <span class="text-gold font-bold">Éole</span> & <span class="text-gold font-bold">Antigravity</span></p>
      </div>

      <div class="mb-6">
        <a
          href="https://github.com/gnueole/papyconnect"
          target="_blank"
          rel="noopener noreferrer"
          class="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl bg-rim/30 hover:bg-gold/10 border border-rim hover:border-gold/30 text-xs font-semibold text-gray-300 hover:text-white transition-all active:scale-95"
        >
          <svg class="w-4 h-4 fill-currentColor" viewBox="0 0 24 24">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482C19.138 20.193 22 16.44 22 12.017 22 6.484 17.522 2 12 2z"/>
          </svg>
          GitHub Repository
        </a>
      </div>

      <p class="text-[10px] text-gray-500 mb-2">PapyConnect is part of Éole's Home Lab</p>
      <p class="text-[10px] text-gray-600">v1.4.0 &copy; 2026</p>
    </div>
  </div>
